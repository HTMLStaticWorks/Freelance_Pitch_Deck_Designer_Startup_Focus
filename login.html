<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckDesigner- Login</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light-custom d-flex flex-column min-vh-100">

    <!-- Top Navigation -->
    <nav class="p-4 d-flex justify-content-end align-items-center position-absolute w-100 top-0">
        <div class="d-flex gap-2">
            <button class="utility-btn" id="rtlToggle" aria-label="RTL Toggle">
                <i class="ph ph-arrows-left-right fs-5"></i>
            </button>
            <button class="utility-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="ph ph-moon fs-5"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center px-4">
        <div class="bento-card p-5 w-100 shadow-lg border-0" style="max-width: 450px;">
            <div class="text-center mb-4">
                <a class="navbar-brand fs-3 fw-bold d-inline-block mb-3" href="index.html">
                    <i class="ph-fill ph-presentation-chart text-primary"></i> DeckDesigner
                </a>
                <h3 class="fw-bold mb-2">Welcome back</h3>
                <p class="text-secondary small">Please enter your details to sign in.</p>
            </div>

            <form>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small mb-0">Password</label>
                    <div class="password-toggle-wrapper">
                        <input type="password" class="form-control" placeholder="Enter Password" required>
                        <i class="ph ph-eye password-toggle-icon"></i>
                    </div>
                </div>

                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2 mb-4">
                    <div class="form-check mb-0">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small text-secondary" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="small text-primary text-decoration-none">Forgot password?</a>
                </div>

                <a href="dashboard.html" class="btn btn-primary w-100 mb-3">Sign In</a>

                <div class="text-center my-4 position-relative">
                    <hr class="text-secondary opacity-25">
                    <span class="small text-secondary position-absolute top-50 start-50 translate-middle px-3 text-nowrap"
                        style="background: var(--bg-white);">Or continue with</span>
                </div>

                <div class="row g-2">
                    <div class="col-4">
                        <button type="button" class="btn btn-outline-secondary w-100 bg-white"
                            aria-label="Sign in with Google">
                            <i class="ph-fill ph-google-logo fs-5 text-dark"></i>
                        </button>
                    </div>
                    <div class="col-4">
                        <button type="button" class="btn btn-outline-secondary w-100 bg-white"
                            aria-label="Sign in with Facebook">
                            <i class="ph-fill ph-facebook-logo fs-5 text-dark"></i>
                        </button>
                    </div>
                    <div class="col-4">
                        <button type="button" class="btn btn-outline-secondary w-100 bg-white"
                            aria-label="Sign in with Apple">
                            <i class="ph-fill ph-apple-logo fs-5 text-dark"></i>
                        </button>
                    </div>
                </div>
            </form>

            <p class="text-center mt-4 small text-secondary">
                Don't have an account? <a href="register.html" class="fw-bold text-primary text-decoration-none">Sign
                    up</a>
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
